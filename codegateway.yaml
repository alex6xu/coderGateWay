# CodeGateway Configuration

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"

database:
  driver: "sqlite"
  dsn: "./data/codegateway.db"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

agent:
  default_model: "mimo-auto"
  max_iterations: 50
  max_tokens: 128000
  temperature: 0.7
  
  memory:
    enabled: true
    reconcile_on_search: true
    score_floor: 0.15
  
  skills:
    builtin_path: "./skills"
    custom_path: "~/.codegateway/skills"
  
  cron:
    enabled: true
    tick_interval: "1m"

gateway:
  enabled: true
  
  routing:
    strategy: "auto"
    fallback_enabled: true
    retry_count: 3
  
  # 预置渠道
  default_channels:
    - name: "MiMo Free"
      type: 7
      base_url: "https://api.xiaomimimo.com"
      key: ""
      models: ""
      weight: 10
      priority: 100

platforms:
  telegram:
    enabled: false
    bot_token: ""
  
  web:
    enabled: true
    cors_origins: ["*"]
  
  terminal:
    enabled: true
  
  wechat:
    enabled: false
    app_id: ""
    app_secret: ""
    token: ""

billing:
  enabled: true
  currency: "USD"
  
  pricing:
    mimo-auto:
      input: 0
      output: 0
    mimo-v2.5-pro:
      input: 0.5
      output: 2.0
    mimo-v2.5:
      input: 0.3
      output: 1.0
    gpt-4o:
      input: 2.5
      output: 10
    claude-3-5-sonnet:
      input: 3
      output: 15
    deepseek-v3:
      input: 0.14
      output: 0.28
