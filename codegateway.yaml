# CodeGateway Configuration

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"

database:
  driver: "sqlite"
  dsn: "./data/codegateway.db"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

agent:
  default_model: "mimo-auto"
  max_iterations: 12
  # Completion / generation cap (not the full context window)
  max_tokens: 4096
  # Soft budget for prompt assembly (stable prefix + variable user suffix)
  # Layout: fixed system → session checkpoint → append-only history → current user
  # (FTS retrieval is attached to the current user message to protect prefix cache)
  context_budget_tokens: 8000
  history_max_turns: 8
  tool_result_max_chars: 4000
  tool_result_keep_recent: 2
  # Infrequent fold of older turns into checkpoint (advances history cutoff)
  summarize_every_turns: 10
  temperature: 0.7
  prompt_cache_enabled: true
  parallel_readonly_tools: true
  tree_hint_limit: 40
  
  memory:
    enabled: true
    reconcile_on_search: true
    score_floor: 0.15
    max_snippets: 5
  
  skills:
    builtin_path: "./skills"
    custom_path: "~/.codegateway/skills"
  
  cron:
    enabled: true
    tick_interval: "1m"

gateway:
  enabled: true
  
  routing:
    strategy: "auto"
    fallback_enabled: true
    retry_count: 3
  
  # 预置渠道
  default_channels:
    - name: "MiMo Free"
      type: 7
      base_url: "https://api.xiaomimimo.com"
      key: ""
      models: ""
      weight: 10
      priority: 100

platforms:
  telegram:
    enabled: false
    bot_token: ""
  
  web:
    enabled: true
    cors_origins: ["*"]
  
  terminal:
    enabled: true
  
  wechat:
    enabled: false
    app_id: ""
    app_secret: ""
    token: ""

billing:
  enabled: true
  currency: "USD"
  
  pricing:
    mimo-auto:
      input: 0
      output: 0
    mimo-v2.5-pro:
      input: 0.5
      output: 2.0
    mimo-v2.5:
      input: 0.3
      output: 1.0
    gpt-4o:
      input: 2.5
      output: 10
    claude-3-5-sonnet:
      input: 3
      output: 15
    deepseek-v3:
      input: 0.14
      output: 0.28
    agnes-1.5-flash:
      input: 0.1
      output: 0.4
    agnes-2.0-flash:
      input: 0.2
      output: 0.8
    glm-4-flash:
      input: 0.1
      output: 0.1
    glm-4.7:
      input: 0.5
      output: 2.0
    glm-5.2:
      input: 1.0
      output: 4.0
