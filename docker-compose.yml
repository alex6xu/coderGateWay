version: '3.8'

services:
  codegateway:
    build: .
    container_name: codegateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./codegateway.yaml:/app/codegateway.yaml
    environment:
      - TZ=Asia/Shanghai

